<!DOCTYPE html>
<html>

<head>

<title>DSA Learning Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#030712,
#0a1f44,
#04162f
);
}

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:
radial-gradient(
circle,
rgba(0,255,255,.4),
transparent
);
filter:blur(130px);
animation:move 8s infinite;
}

@keyframes move{
50%{
transform:
translateY(-80px)
rotate(180deg);
}
}

.main{
position:relative;
z-index:10;
text-align:center;
color:white;
}

.title{
font-size:64px;
font-weight:bold;
text-shadow:0 0 40px cyan;
margin-bottom:15px;
}

.welcome{
font-size:28px;
margin-bottom:60px;
color:#d8e8ff;
}

.cards{
display:flex;
gap:70px;
justify-content:center;
}

.card{
width:320px;
height:370px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:30px;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
cursor:pointer;
transition:.6s;
box-shadow:0 0 50px rgba(0,255,255,.4);
}

.card:hover{
transform:perspective(1000px) rotateY(18deg) translateY(-20px);
}

.footer{
margin-top:60px;
font-size:20px;
color:#b7c8ff;
}

.name{
color:#00ffff;
text-shadow:0 0 15px cyan, 0 0 30px #00ffff;
}

</style>

</head>

<body>

<div class="main">

<div class="title">
DSA LEARNING PORTAL
</div>

<div class="welcome">
✨ Welcome to DSA Learning ✨
</div>

<div class="cards">

<div class="card" onclick="location.href='linear.html'">
LINEAR
</div>

<div class="card" onclick="location.href='nonlinear.html'">
NON LINEAR
</div>

</div>

<div class="footer">
Designed & Developed by <b class="name">VEERA PRASAD🚀</b>
</div>

</div>

</body>

</html>
