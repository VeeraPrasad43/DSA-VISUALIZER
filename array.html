<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Array Operations Visualizer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
  color:white;
}

h1{
  text-align:center;
  margin:10px 0;
  color:#00e5ff;
}

/* BACK BUTTON */
#backBtn{
  position:fixed;
  top:10px;
  left:10px;
  padding:10px 15px;
  background:#00e5ff;
  color:#000;
  border:none;
  border-radius:8px;
  cursor:pointer;
  z-index:1000;
}

/* CONTROLS */
.controls{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  background:rgba(0,0,0,0.3);
  padding:10px;
  border-radius:10px;
}

input,button{
  padding:8px;
  margin:4px;
  border-radius:6px;
  border:none;
}

/* SCENE */
.scene{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1200px;
}

/* ITEM WRAPPER */
.item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

/* CUBE */
.cube{
  width:75px;
  height:75px;
  position:relative;
  transform-style:preserve-3d;
}

/* SEARCH HIGHLIGHT */
.cube.active{
  transform:scale(1.2);
  filter:drop-shadow(0 0 12px yellow);
}

/* FACES */
.face{
  position:absolute;
  width:75px;
  height:75px;
  background:rgba(0,229,255,0.85);
  border:1px solid #fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

.front{transform:translateZ(37.5px);}
.back{transform:rotateY(180deg) translateZ(37.5px);}
.left{transform:rotateY(-90deg) translateZ(37.5px);}
.right{transform:rotateY(90deg) translateZ(37.5px);}
.top{transform:rotateX(90deg) translateZ(37.5px);}
.bottom{transform:rotateX(-90deg) translateZ(37.5px);}

/* INDEX BOX BELOW */
.index-box{
  background:#000;
  color:#00e5ff;
  font-size:12px;
  padding:3px 8px;
  border:1px solid #00e5ff;
  border-radius:6px;
}

.cube-container{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
}

</style>
</head>

<body>

<button id="backBtn" onclick="goBack()">Back to Linear</button>

<h1>3D ARRAY OPERATIONS VISUALIZER</h1>

<div class="controls">
  <input type="number" id="value" placeholder="Enter value">
  <button onclick="insert()">Insert</button>
  <button onclick="deleteVal()">Delete</button>
  <button onclick="updateVal()">Update</button>
  <button onclick="searchVal()">Search</button>
</div>

<div class="scene">
  <div class="cube-container" id="container"></div>
</div>

<script>
let arr = [];

function render(){
  const c = document.getElementById("container");
  c.innerHTML = "";

  arr.forEach((v,i)=>{
    const wrapper = document.createElement("div");
    wrapper.className = "item";

    const cube = document.createElement("div");
    cube.className = "cube";

    cube.innerHTML = `
      <div class="face front">${v}</div>
      <div class="face back">${v}</div>
      <div class="face left">${v}</div>
      <div class="face right">${v}</div>
      <div class="face top">${v}</div>
      <div class="face bottom">${v}</div>
    `;

    const indexBox = document.createElement("div");
    indexBox.className = "index-box";
    indexBox.innerText = "Index: " + i;

    wrapper.appendChild(cube);
    wrapper.appendChild(indexBox);

    c.appendChild(wrapper);
  });
}

function insert(){
  let v = document.getElementById("value").value;
  if(v==="") return;
  arr.push(v);
  render();
}

function deleteVal(){
  arr.pop();
  render();
}

function updateVal(){
  let v = document.getElementById("value").value;
  if(arr.length>0) arr[arr.length-1]=v;
  render();
}

function searchVal(){
  let v = document.getElementById("value").value;

  document.querySelectorAll(".cube").forEach(c=>{
    c.classList.remove("active");
  });

  arr.forEach((val,i)=>{
    if(val == v){
      document.querySelectorAll(".cube")[i].classList.add("active");
    }
  });
}

function goBack(){
  window.location.href = "linear.html";
}

render();
</script>

</body>
</html>
