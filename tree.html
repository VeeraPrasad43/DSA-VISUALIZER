<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Visualizer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

/* 3D Background */

.background{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.cube{
position:absolute;
width:70px;
height:70px;
border:2px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.08);
animation:rotateCube 12s linear infinite;
transform-style:preserve-3d;
}

.cube:nth-child(1){left:10%;top:15%;}
.cube:nth-child(2){left:25%;top:70%;animation-duration:16s;}
.cube:nth-child(3){left:45%;top:30%;animation-duration:18s;}
.cube:nth-child(4){left:70%;top:20%;animation-duration:14s;}
.cube:nth-child(5){left:80%;top:75%;animation-duration:20s;}
.cube:nth-child(6){left:55%;top:60%;animation-duration:17s;}

@keyframes rotateCube{

0%{
transform:rotateX(0deg) rotateY(0deg);
}

100%{
transform:rotateX(360deg) rotateY(360deg);
}

}

.back{
position:absolute;
top:20px;
left:20px;
padding:10px 20px;
background:#00bcd4;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:.4s;
}

.back:hover{
background:#00e5ff;
transform:scale(1.1);
}

h1{
margin-top:20px;
font-size:35px;
text-shadow:0 0 20px cyan;
}

.panel{

margin-top:20px;

background:rgba(255,255,255,.1);

padding:20px;

border-radius:20px;

backdrop-filter:blur(10px);

box-shadow:0 0 20px cyan;

}

input{

padding:10px;

width:150px;

border:none;

border-radius:8px;

font-size:18px;

text-align:center;

}

button{

padding:10px 15px;

margin:5px;

border:none;

border-radius:8px;

background:#00bcd4;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#00e5ff;

transform:scale(1.08);

}

#tree{

margin-top:40px;

display:flex;

justify-content:center;

align-items:center;

flex-wrap:wrap;

min-height:100px;

}

.node{

width:60px;

height:60px;

border-radius:50%;

background:#00bcd4;

display:flex;

justify-content:center;

align-items:center;

font-size:22px;

font-weight:bold;

margin:10px;

box-shadow:0 0 20px cyan;

animation:pop .4s;

}

@keyframes pop{

from{
transform:scale(0);
}

to{
transform:scale(1);
}

}

#output{

margin-top:20px;

font-size:22px;

color:#fff176;

font-weight:bold;

}

</style>

</head>

<body>

<div class="background">

<div class="cube"></div>
<div class="cube"></div>
<div class="cube"></div>
<div class="cube"></div>
<div class="cube"></div>
<div class="cube"></div>

</div>

<a href="nonlinear.html" class="back">⬅ Back</a>

<h1>🌳 Tree Visualizer 🌳</h1>

<div class="panel">

<input type="number" id="value" placeholder="Node">

<button onclick="insertNode()">Insert</button>

<button onclick="deleteNode()">Delete</button>

<button onclick="searchNode()">Search</button>

<button onclick="inorder()">Inorder</button>

<button onclick="clearTree()">Clear</button>
<button onclick="preorder()">Preorder</button>

<button onclick="postorder()">Postorder</button>

<button onclick="levelorder()">Level Order</button>

</div>

<div id="output"></div>

<div id="tree"></div>

<script>

let tree=[];

function draw(){

let t=document.getElementById("tree");

t.innerHTML="";

tree.forEach(v=>{

let n=document.createElement("div");

n.className="node";

n.innerHTML=v;

t.appendChild(n);

});

}

function insertNode(){

let input = document.getElementById("value");
let v = parseInt(input.value);

if(!isNaN(v) && !tree.includes(v)){
    tree.push(v);
    tree.sort((a,b)=>a-b);
    draw();
}

input.value = "";
input.focus();

}



function deleteNode(){

let input = document.getElementById("value");
let v = parseInt(input.value);

tree = tree.filter(x => x != v);
draw();

input.value = "";
input.focus();

}

function searchNode(){

let input = document.getElementById("value");
let v = parseInt(input.value);

document.getElementById("output").innerHTML =
tree.includes(v) ? "✅ Node Found" : "❌ Node Not Found";

input.value = "";
input.focus();

}

function inorder(){

document.getElementById("output").innerHTML=

"Inorder : "+tree.join(" → ");

}

function clearTree(){

tree=[];

draw();

document.getElementById("output").innerHTML="Tree Cleared";

}
function preorder(){

document.getElementById("output").innerHTML =
"Preorder : " + tree.join(" → ");

}

function postorder(){

document.getElementById("output").innerHTML =
"Postorder : " + [...tree].reverse().join(" → ");

}

function levelorder(){

document.getElementById("output").innerHTML =
"Level Order : " + tree.join(" → ");

}

</script>

</body>
</html>
