<!DOCTYPE html>
<html>

<head>

<title>Non Linear</title>

<style>

body{
margin:0;
background:#071220;
height:100vh;
font-family:Poppins;
color:white;
text-align:center;
}

h1{
padding-top:40px;
font-size:50px;
}

.wrap{

display:flex;

justify-content:center;

gap:40px;

margin-top:100px;

flex-wrap:wrap;

}

.card{

width:260px;

height:260px;

background:
rgba(255,255,255,.08);

border-radius:30px;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

cursor:pointer;

transition:.6s;

box-shadow:
0 0 40px cyan;

}

.card:hover{

transform:
perspective(1000px)
rotateY(20deg)
translateY(-15px);

}
.home{

position:fixed;

bottom:40px;

left:50%;

transform:
translateX(-50%);

padding:18px 50px;

font-size:22px;

font-weight:bold;

color:white;

background:

linear-gradient(
135deg,
#00e5ff,
#004cff
);

border:none;

border-radius:50px;

cursor:pointer;

transition:.6s;

box-shadow:

0 0 30px cyan,

0 0 60px #00e5ff;

animation:

float 2s infinite;

}

.home:hover{

transform:

translateX(-50%)

rotateX(20deg)

scale(1.12);

box-shadow:

0 0 60px cyan,

0 0 100px #00e5ff;

}

@keyframes float{

50%{

transform:

translateX(-50%)

translateY(-12px);

}

}

</style>

</head>

<body>

<h1>NON LINEAR DATA STRUCTURES</h1>

<div class="wrap">

<div class="card"
onclick="location.href='tree.html'">

TREE

</div>

<div class="card"
onclick="location.href='graph.html'">

GRAPH

</div>

<div class="card"
onclick="location.href='heap.html'">

HEAP

</div>



</div>

</div>
<button
class="home"
onclick="location.href='dsa5.html'">

🏠 HOME PAGE

</button>

</body>

</html>
